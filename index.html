<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Main Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0e2744, #1d4976);
  color:#fff;
}

.header {
  text-align:center;
  padding:40px 20px;
}

.header h1 {
  font-size:36px;
  margin-bottom:10px;
}

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  padding:40px;
}

.card {
  background:#fff;
  color:#0e2744;
  width:300px;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

.card h2 {
  margin-bottom:20px;
}

.card p {
  font-size:14px;
  margin-bottom:20px;
}

.btn {
  display:inline-block;
  padding:10px 20px;
  background:#0e2744;
  color:#fff;
  text-decoration:none;
  border-radius:10px;
}

.btn:hover {
  background:#1d4976;
}
</style>
</head>

<body>

<div class="header">
  <h1>Data Analytics Dashboard</h1>
  <p>Select a module to continue</p>
</div>

<div class="container">

  <!-- LANDUSE -->
  <div class="card">4
    <h2>🌍 Landuse</h2>
    <p>View spatial landuse classification and analytics</p>
    <a href="landuse.html" class="btn">Open</a>
  </div>

  <!-- PERMANENT COMMERCIALIZATION -->
  <div class="card">
    <h2>🏢 Permanent Commercialization</h2>
    <p>Manage and analyze commercialization data</p>
    <a href="permanent.html" class="btn">Open</a>
  </div>

  <!-- ILLEGAL PENALTY -->
  <div class="card">
    <h2>⚠ Illegal Penalty</h2>
    <p>Track illegal plots and penalty records</p>
    <a href="illegal.html" class="btn">Open</a>
  </div>

</div>

</body>
</html>
